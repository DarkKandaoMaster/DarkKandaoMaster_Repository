<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* 引入与你前端页面匹配的字体 */
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&amp;family=Noto+Sans+SC:wght@400;500&amp;display=swap');

      .bg { 
        fill: #ffffff; /* 使用你项目中的 var(--bg-page) 背景色 */
      }

      .container {
        /* 停留2秒后，花费1.5秒平滑向左滑动 */
        animation: slideLeft 1.5s cubic-bezier(0.25, 1, 0.3, 1) 2s forwards;
        /* 初始向右偏移 460px，让 InferenceDeck 完美居中于 900 的位置 */
        transform: translateX(460px);
      }

      .title {
        font-family: 'Inter', sans-serif;
        font-size: 68px;
        font-weight: 700;
        fill: url(#title-grad); /* 引用下方的蓝紫渐变色 */
        opacity: 0;
        /* 延迟0.5秒后，淡入并轻微上浮 */
        animation: fadeInTitle 1s ease-out 0.5s forwards;
      }

      .subtitle {
        font-family: 'Noto Sans SC', sans-serif;
        font-size: 44px;
        font-weight: 500;
        fill: #334155; /* 使用你项目中的 var(--text-regular) */
        opacity: 0;
        /* 与滑动动画同步执行，从左侧微微滑出并淡入 */
        animation: revealSubtitle 1.5s cubic-bezier(0.25, 1, 0.3, 1) 2s forwards;
      }

      @keyframes fadeInTitle {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes slideLeft {
        from { transform: translateX(460px); }
        to { transform: translateX(0px); } /* 最终归零，让整句话居中 */
      }

      @keyframes revealSubtitle {
        0% { opacity: 0; transform: translateX(-30px); }
        100% { opacity: 1; transform: translateX(0); }
      }
    </style>

    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <g class="container">
    <text class="title" x="275" y="560">InferenceDeck</text>
    <text class="subtitle" x="770" y="555">, 一个评估多组学癌症亚型分型方法的平台</text>
  </g>
</svg>