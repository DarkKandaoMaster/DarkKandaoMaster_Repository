<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="badge-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <style>
        /* 基础样式定义 */
        .bg { fill: transparent; }
        .text-code { font-family: 'Fira Code', 'Consolas', monospace; font-size: 24px; }
        .bracket { font-family: 'Fira Code', 'Consolas', monospace; font-size: 90px; fill: #ABB2BF; font-weight: 300; }
        .comma { font-family: 'Fira Code', 'Consolas', monospace; font-size: 50px; fill: #ABB2BF; }
        .box-rect { rx: 16; ry: 16; stroke-width: 2; stroke: rgba(255,255,255,0.05); }
        .box-text { font-family: 'Fira Code', 'Consolas', monospace; font-size: 42px; font-weight: bold; fill: #1E2227; text-anchor: middle; }

        /* 动画关键帧 */
        @keyframes oldBoxAnim {
            0%, 30% { opacity: 1; transform: translate(300px, 140px) scale(1); }
            40%, 85% { opacity: 0; transform: translate(300px, 220px) scale(0.5); } /* 被挤出掉落并淡出 */
            95%, 100% { opacity: 1; transform: translate(300px, 140px) scale(1); }
        }

        @keyframes newBoxAnim {
            0%, 10% { opacity: 0; transform: translate(300px, 0px) scale(0.8); }
            15%, 30% { opacity: 1; transform: translate(300px, 40px) scale(1); } /* 停顿悬浮等待阶段 */
            40%, 85% { opacity: 1; transform: translate(300px, 140px) scale(1); }  /* 砸入替换列表最终位置 */
            95%, 100% { opacity: 0; transform: translate(300px, 140px) scale(0.8); }
        }

        @keyframes highlightMethod {
            0%, 30% { fill: #61AFEF; filter: none; }
            40%, 85% { fill: #98C379; filter: url(#glow); text-shadow: 0 0 10px rgba(152,195,121,0.5); }
            95%, 100% { fill: #61AFEF; filter: none; }
        }
        @keyframes highlightParam {
            0%, 25% { fill: #D19A66; }
            35%, 85% { fill: #D19A66; font-weight: bold; }
            95%, 100% { fill: #D19A66; }
        }

        /* 动画类应用 (带有一点弹性缓冲效果) */
        .anim-old-box { animation: oldBoxAnim 5s infinite cubic-bezier(0.34, 1.56, 0.64, 1); }
        .anim-new-box { animation: newBoxAnim 5s infinite cubic-bezier(0.34, 1.56, 0.64, 1); }
        .anim-method { animation: highlightMethod 5s infinite; }
        .anim-param { animation: highlightParam 5s infinite; }
    </style>

    <rect width="100%" height="100%" rx="20" class="bg"/>

    <text x="350" y="280" class="text-code" text-anchor="middle">
        <tspan fill="#E06C75">列表</tspan>
        <tspan fill="#ABB2BF">[</tspan>
        <tspan fill="#D19A66">1</tspan>
        <tspan fill="#ABB2BF">]</tspan>
        <tspan class="anim-method">=</tspan>
        <tspan fill="#D19A66">4</tspan>
    </text>

    <g>
        <text x="140" y="208" class="bracket">[</text>
        
        <text x="520" y="208" class="bracket">]</text>

        <text x="277" y="215" class="comma">,</text>
        <text x="387" y="215" class="comma">,</text>

        <g transform="translate(190, 140)">
            <rect width="90" height="90" fill="#61AFEF" class="box-rect"/>
            <text x="45" y="45" dy="0.35em" class="box-text">1</text>
        </g>
        
        <g class="anim-old-box">
            <rect width="90" height="90" fill="#61AFEF" class="box-rect"/>
            <text x="45" y="45" dy="0.35em" class="box-text">2</text>
        </g>
        
        <g transform="translate(410, 140)">
            <rect width="90" height="90" fill="#61AFEF" class="box-rect"/>
            <text x="45" y="45" dy="0.35em" class="box-text">3</text>
        </g>

        <g class="anim-new-box">
            <rect width="90" height="90" fill="#98C379" class="box-rect"/>
            <text x="45" y="45" dy="0.35em" class="box-text">4</text>
            <circle cx="90" cy="0" r="14" fill="#E5C07B" filter="url(#badge-shadow)"/>
            <text x="90" y="0" dy="0.35em" font-family="monospace" font-size="20" font-weight="bold" fill="#282C34" text-anchor="middle">=</text>
        </g>
    </g>
</svg>