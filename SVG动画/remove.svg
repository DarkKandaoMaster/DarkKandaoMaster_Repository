<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="badge-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.5"/>
        </filter>
    </defs>

    <style>
        /* 基础样式定义 */
        .bg { fill: transparent; }
        .text-code { font-family: 'Fira Code', 'Consolas', monospace; font-size: 24px; }
        .bracket { font-family: 'Fira Code', 'Consolas', monospace; font-size: 90px; fill: #ABB2BF; font-weight: 300; }
        .comma { font-family: 'Fira Code', 'Consolas', monospace; font-size: 50px; fill: #ABB2BF; }
        .box-rect { rx: 16; ry: 16; stroke-width: 2; stroke: rgba(255,255,255,0.05); }
        .box-text { font-family: 'Fira Code', 'Consolas', monospace; font-size: 42px; font-weight: bold; fill: #1E2227; text-anchor: middle; }

        /* 动画关键帧 - 针对 remove(2) 重新编排的逻辑 */
        @keyframes bracketMove {
            0%, 40% { transform: translateX(630px); }
            50%, 80% { transform: translateX(520px); } /* 配合元素移除，向左收缩 */
            90%, 100% { transform: translateX(630px); }
        }
        
        @keyframes commaFade {
            0%, 40% { opacity: 1; }
            50%, 80% { opacity: 0; } /* 原本在 2 和 3 之间的逗号淡出 */
            90%, 100% { opacity: 1; }
        }

        @keyframes removeBoxAnim {
            0%, 25% { opacity: 1; transform: translate(300px, 140px) scale(1); } /* 定位到数字 2 */
            35% { opacity: 1; transform: translate(300px, 40px) scale(1.05); } /* 向上弹出 */
            45%, 75% { opacity: 0; transform: translate(300px, -20px) scale(0.8); } /* 向上消失 */
            85% { opacity: 0; transform: translate(300px, 140px) scale(0); } /* 隐身归位 */
            95%, 100% { opacity: 1; transform: translate(300px, 140px) scale(1); } /* 原地淡入列表 */
        }

        /* 元素 3 和 4 向左补位的动画 */
        @keyframes slideLeft3 {
            0%, 40% { transform: translate(410px, 140px); }
            50%, 80% { transform: translate(300px, 140px); }
            90%, 100% { transform: translate(410px, 140px); }
        }

        @keyframes slideLeft4 {
            0%, 40% { transform: translate(520px, 140px); }
            50%, 80% { transform: translate(410px, 140px); }
            90%, 100% { transform: translate(520px, 140px); }
        }

        /* 最后的逗号随补位元素向左移动 */
        @keyframes slideComma {
            0%, 40% { transform: translateX(497px); }
            50%, 80% { transform: translateX(387px); }
            90%, 100% { transform: translateX(497px); }
        }

        @keyframes popRectColor {
            0%, 15% { fill: #61AFEF; }
            20%, 45% { fill: #E06C75; } /* 变红 */
            46%, 100% { fill: #61AFEF; } /* 隐身期间提前切回蓝色 */
        }

        @keyframes badgeAnim {
            0%, 15% { opacity: 0; transform: scale(0); }
            20%, 45% { opacity: 1; transform: scale(1); } /* 显示减号 */
            46%, 100% { opacity: 0; transform: scale(0); } /* 隐身期间提前重置 */
        }

        @keyframes highlightMethod {
            0%, 15% { fill: #61AFEF; filter: none; text-shadow: none; }
            20%, 45% { fill: #E06C75; filter: url(#glow); text-shadow: 0 0 10px rgba(224,108,117,0.5); }
            46%, 100% { fill: #61AFEF; filter: none; text-shadow: none; }
        }

        /* 动画类应用 */
        .anim-bracket { animation: bracketMove 5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .anim-comma { animation: commaFade 5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .anim-slide-comma { animation: slideComma 5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .anim-remove-box { animation: removeBoxAnim 5s infinite cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .anim-slide-3 { animation: slideLeft3 5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .anim-slide-4 { animation: slideLeft4 5s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        .anim-pop-color { animation: popRectColor 5s infinite; }
        .anim-badge { animation: badgeAnim 5s infinite; transform-origin: 90px 0px; }
        .anim-method { animation: highlightMethod 5s infinite; }
        .anim-param { animation: highlightParam 5s infinite; }
    </style>

    <rect width="100%" height="100%" rx="20" class="bg"/>

    <text x="400" y="280" class="text-code" text-anchor="middle">
        <tspan fill="#E06C75">列表</tspan>
        <tspan fill="#ABB2BF">.</tspan>
        <tspan class="anim-method">remove</tspan>
        <tspan fill="#ABB2BF">(</tspan>
        <tspan fill="#D19A66">2</tspan>
        <tspan fill="#ABB2BF">)</tspan>
    </text>

    <g>
        <text x="140" y="208" class="bracket">[</text>
        <text y="208" class="bracket anim-bracket">]</text>

        <text x="277" y="215" class="comma">,</text>
        <text x="387" y="215" class="comma anim-comma">,</text>
        <text y="215" class="comma anim-slide-comma">,</text>

        <g transform="translate(190, 140)">
            <rect width="90" height="90" fill="#61AFEF" class="box-rect"/>
            <text x="45" y="45" dy="0.35em" class="box-text">1</text>
        </g>
        
        <g class="anim-remove-box">
            <rect width="90" height="90" class="box-rect anim-pop-color"/>
            <text x="45" y="45" dy="0.35em" class="box-text">2</text>
            <g class="anim-badge">
                <circle cx="90" cy="0" r="14" fill="#E06C75" filter="url(#badge-shadow)"/>
                <text x="90" y="0" dy="0.35em" font-family="monospace" font-size="20" font-weight="bold" fill="#282C34" text-anchor="middle">-</text>
            </g>
        </g>

        <g class="anim-slide-3">
            <rect width="90" height="90" fill="#61AFEF" class="box-rect"/>
            <text x="45" y="45" dy="0.35em" class="box-text">3</text>
        </g>
        
        <g class="anim-slide-4">
            <rect width="90" height="90" fill="#61AFEF" class="box-rect"/>
            <text x="45" y="45" dy="0.35em" class="box-text">4</text>
        </g>
    </g>
</svg>