<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#005bea" />
    </linearGradient>

    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#005bea" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <clipPath id="textClip">
      <rect x="150" y="50" height="100" width="0">
        <animate attributeName="width" values="0; 0; 450; 450; 0; 0" keyTimes="0; 0.16; 0.33; 0.66; 0.83; 1" dur="3s" repeatCount="indefinite" />
      </rect>
    </clipPath>
  </defs>

  <g>
    <rect x="150" y="65" height="70" width="0" rx="4" fill="url(#boxGrad)" stroke="#00f2fe" stroke-width="2">
      <animate attributeName="width" values="0; 0; 400; 400; 0; 0" keyTimes="0; 0.16; 0.33; 0.66; 0.83; 1" dur="3s" repeatCount="indefinite" />
    </rect>
    <text x="220" y="110" font-family="'Inter', '-apple-system', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="4" clip-path="url(#textClip)">
      一、上传文件
    </text>
  </g>

  <g>
    <circle cx="150" cy="100" r="35" fill="url(#circleGrad)">
      <animate attributeName="r" values="35; 38; 35; 38; 35" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="150" cy="100" r="50" fill="none" stroke="#00f2fe" stroke-width="3" stroke-dasharray="60 40 20 40" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 150 100" to="360 150 100" dur="3s" repeatCount="indefinite" />
    </circle>

    <circle cx="150" cy="100" r="62" fill="none" stroke="#005bea" stroke-width="2" stroke-dasharray="30 80 100 40" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="360 150 100" to="0 150 100" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 150 100" to="360 150 100" dur="1.5s" repeatCount="indefinite" />
      <circle cx="200" cy="100" r="4" fill="#ffffff" />
      <circle cx="100" cy="100" r="4" fill="#ffffff" />
    </g>
  </g>
</svg>